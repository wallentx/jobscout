name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: Release tag to build, for example v0.1.0
        required: true
        type: string

permissions:
  actions: read
  attestations: read
  checks: read
  contents: write
  deployments: read
  discussions: read
  issues: read
  packages: read
  pages: read
  pull-requests: read
  repository-projects: read
  statuses: read

env:
  JOBSCOUT_RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.event.release.tag_name }}

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.version || github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  gate:
    name: make all
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.JOBSCOUT_RELEASE_TAG }}
          fetch-depth: 0
          fetch-tags: true

      - name: Actions Toolbox
        uses: wallentx/gh-actions/composite/actions-toolbox@main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          checkout: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run release gate
        env:
          RELEASE_TAG: ${{ env.JOBSCOUT_RELEASE_TAG }}
        run: make all

  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: gate
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.JOBSCOUT_RELEASE_TAG }}
          fetch-depth: 0
          fetch-tags: true

      - name: Actions Toolbox
        uses: wallentx/gh-actions/composite/actions-toolbox@main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          checkout: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release archive
        env:
          RELEASE_TAG: ${{ env.JOBSCOUT_RELEASE_TAG }}
          RELEASE_GOOS: ${{ matrix.goos }}
          RELEASE_GOARCH: ${{ matrix.goarch }}
        run: make release

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: jobscout-${{ env.JOBSCOUT_RELEASE_TAG }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  publish:
    name: publish release assets
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.JOBSCOUT_RELEASE_TAG }}
          fetch-depth: 0
          fetch-tags: true

      - name: Download release archives
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: jobscout-${{ env.JOBSCOUT_RELEASE_TAG }}-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          mapfile -t files < <(find dist -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' \) | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release archives were downloaded" >&2
            exit 1
          fi
          sha256sum "${files[@]}" > dist/checksums.txt

      - name: Ensure GitHub release exists
        if: github.event_name == 'workflow_dispatch'
        run: |
          if ! gh release view "$JOBSCOUT_RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$JOBSCOUT_RELEASE_TAG" --title "$JOBSCOUT_RELEASE_TAG" --generate-notes
          fi

      - name: Upload release assets
        run: gh release upload "$JOBSCOUT_RELEASE_TAG" dist/*.tar.gz dist/*.zip dist/checksums.txt --clobber
