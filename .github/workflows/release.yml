name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      version:
        description: Release tag to build, for example v0.1.0
        required: true
        type: string

permissions:
  actions: read
  attestations: read
  checks: read
  contents: write
  deployments: read
  discussions: read
  issues: read
  packages: read
  pages: read
  pull-requests: read
  repository-projects: read
  statuses: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
  cancel-in-progress: false

jobs:
  gate:
    name: make all
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Check out release tag
        if: github.event_name == 'workflow_dispatch'
        run: git checkout "$RELEASE_TAG"

      - name: Actions Toolbox
        uses: wallentx/gh-actions/composite/actions-toolbox@main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          checkout: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run release gate
        run: make all

  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: gate
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Check out release tag
        if: github.event_name == 'workflow_dispatch'
        run: git checkout "$RELEASE_TAG"

      - name: Actions Toolbox
        uses: wallentx/gh-actions/composite/actions-toolbox@main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          checkout: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release archive
        env:
          RELEASE_GOOS: ${{ matrix.goos }}
          RELEASE_GOARCH: ${{ matrix.goarch }}
        run: make release

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: jobscout-${{ env.RELEASE_TAG }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  publish:
    name: publish release assets
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: jobscout-${{ env.RELEASE_TAG }}-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum ./*.tar.gz ./*.zip > checksums.txt

      - name: Ensure GitHub release exists
        run: |
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --generate-notes
          fi

      - name: Upload release assets
        run: gh release upload "$RELEASE_TAG" dist/*.tar.gz dist/*.zip dist/checksums.txt --clobber
