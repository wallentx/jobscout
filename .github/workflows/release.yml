name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: Exact release tag to build, for example v0.1.0. Leave blank to use bump.
        required: false
        type: string
      bump:
        description: Version bump to use when version is blank.
        required: false
        default: none
        type: choice
        options:
          - none
          - patch
          - minor
          - major

permissions:
  actions: read
  attestations: read
  checks: read
  contents: write
  deployments: read
  discussions: read
  issues: read
  packages: read
  pages: read
  pull-requests: read
  repository-projects: read
  statuses: read

concurrency:
  group: release-${{ github.event_name }}-${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}-${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}-${{ github.event_name == 'workflow_dispatch' && inputs.bump || '' }}
  cancel-in-progress: false

jobs:
  resolve-release:
    name: resolve release tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
      release_target: ${{ steps.resolve.outputs.release_target }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Actions Toolbox
        uses: wallentx/gh-actions/composite/actions-toolbox@main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          checkout: false

      - name: Resolve release tag
        id: resolve
        env:
          EVENT_RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || '' }}
          INPUT_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}
          INPUT_BUMP: ${{ github.event_name == 'workflow_dispatch' && inputs.bump || 'none' }}
        run: |
          set -eu

          if [ "$GITHUB_EVENT_NAME" = "release" ]; then
            release_tag="$EVENT_RELEASE_TAG"
            checkout_ref="$release_tag"
            release_target="$release_tag"
          elif [ -n "$INPUT_VERSION" ]; then
            release_tag="$INPUT_VERSION"
            if git rev-parse -q --verify "refs/tags/$release_tag" >/dev/null; then
              checkout_ref="$release_tag"
              release_target="$release_tag"
            else
              checkout_ref="$GITHUB_SHA"
              release_target="$GITHUB_SHA"
            fi
          else
            case "$INPUT_BUMP" in
              none)
                echo "Provide either an exact version tag or choose a version bump." >&2
                exit 1
                ;;
              major) release_tag="${GH_NEXT_MAJOR:?GH_NEXT_MAJOR is not set}" ;;
              minor) release_tag="${GH_NEXT_MINOR:?GH_NEXT_MINOR is not set}" ;;
              patch) release_tag="${GH_NEXT_PATCH:?GH_NEXT_PATCH is not set}" ;;
              *)
                echo "Unknown bump value: $INPUT_BUMP" >&2
                exit 1
                ;;
            esac
            if git rev-parse -q --verify "refs/tags/$release_tag" >/dev/null; then
              checkout_ref="$release_tag"
              release_target="$release_tag"
            else
              checkout_ref="$GITHUB_SHA"
              release_target="$GITHUB_SHA"
            fi
          fi

          if [ -z "$release_tag" ]; then
            echo "Release tag resolved to an empty value" >&2
            exit 1
          fi

          {
            printf 'release_tag=%s\n' "$release_tag"
            printf 'checkout_ref=%s\n' "$checkout_ref"
            printf 'release_target=%s\n' "$release_target"
          } >> "$GITHUB_OUTPUT"

          printf 'Resolved release tag: %s\n' "$release_tag"
          printf 'Checkout ref: %s\n' "$checkout_ref"
          printf 'Release target: %s\n' "$release_target"

  gate:
    name: make all
    needs: resolve-release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      JOBSCOUT_RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
      JOBSCOUT_CHECKOUT_REF: ${{ needs.resolve-release.outputs.checkout_ref }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.JOBSCOUT_CHECKOUT_REF }}
          fetch-depth: 0
          fetch-tags: true

      - name: Actions Toolbox
        uses: wallentx/gh-actions/composite/actions-toolbox@main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          checkout: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run release gate
        env:
          RELEASE_TAG: ${{ env.JOBSCOUT_RELEASE_TAG }}
        run: make all

  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs:
      - resolve-release
      - gate
    timeout-minutes: 30
    env:
      JOBSCOUT_RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
      JOBSCOUT_CHECKOUT_REF: ${{ needs.resolve-release.outputs.checkout_ref }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.JOBSCOUT_CHECKOUT_REF }}
          fetch-depth: 0
          fetch-tags: true

      - name: Actions Toolbox
        uses: wallentx/gh-actions/composite/actions-toolbox@main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          checkout: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release archive
        env:
          RELEASE_TAG: ${{ env.JOBSCOUT_RELEASE_TAG }}
          RELEASE_GOOS: ${{ matrix.goos }}
          RELEASE_GOARCH: ${{ matrix.goarch }}
        run: make release

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: jobscout-${{ env.JOBSCOUT_RELEASE_TAG }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  publish:
    name: publish release assets
    runs-on: ubuntu-latest
    needs:
      - resolve-release
      - build
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
      JOBSCOUT_RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
      JOBSCOUT_CHECKOUT_REF: ${{ needs.resolve-release.outputs.checkout_ref }}
      JOBSCOUT_RELEASE_TARGET: ${{ needs.resolve-release.outputs.release_target }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.JOBSCOUT_CHECKOUT_REF }}
          fetch-depth: 0
          fetch-tags: true

      - name: Download release archives
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: jobscout-${{ env.JOBSCOUT_RELEASE_TAG }}-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          mapfile -t files < <(find dist -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' \) | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release archives were downloaded" >&2
            exit 1
          fi
          sha256sum "${files[@]}" > dist/checksums.txt

      - name: Ensure GitHub release exists
        if: github.event_name == 'workflow_dispatch'
        run: |
          if ! gh release view "$JOBSCOUT_RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$JOBSCOUT_RELEASE_TAG" --target "$JOBSCOUT_RELEASE_TARGET" --title "$JOBSCOUT_RELEASE_TAG" --generate-notes
          fi

      - name: Upload release assets
        run: gh release upload "$JOBSCOUT_RELEASE_TAG" dist/*.tar.gz dist/*.zip dist/checksums.txt --clobber
